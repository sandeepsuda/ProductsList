services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./server
    container_name: products-api
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/productslist
      - PORT=3001
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      args:
        - VITE_API_URL=http://localhost:3001/api/products
    container_name: products-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
